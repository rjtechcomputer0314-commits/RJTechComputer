<!-- MODAL REGISTRO -->
<div class="modal" id="modalRegistro" role="dialog" aria-modal="true" aria-labelledby="tituloRegistro">

    <div class="modal-contenido">

        <button class="cerrar" id="cerrarRegistro" aria-label="Cerrar">&times;</button>

        <!-- ══ PASO 1: ELEGIR ROL ══════════════════════════════ -->
        <div id="pasoRol" class="paso-registro">

            <div class="modal-icono">
                <i class="fas fa-user-circle" aria-hidden="true"></i>
            </div>

            <h2 id="tituloRegistro">¡Únete hoy!</h2>
            <p class="modal-subtitulo">¿Cómo vas a usar la plataforma?</p>

            <div class="roles-grid">

                <button class="rol-card" data-rol="estudiante" aria-pressed="false">
                    <div class="rol-icono">
                        <i class="fas fa-user-graduate" aria-hidden="true"></i>
                    </div>
                    <h3>Estudiante</h3>
                    <p>Únete a cursos, accede a materiales y sube tus tareas.</p>
                    <ul class="rol-features">
                        <li><i class="fas fa-check" aria-hidden="true"></i> Unirse a cursos con código</li>
                        <li><i class="fas fa-check" aria-hidden="true"></i> Ver anuncios y archivos</li>
                        <li><i class="fas fa-check" aria-hidden="true"></i> Entregar tareas</li>
                        <li><i class="fas fa-check" aria-hidden="true"></i> Laboratorios virtuales</li>
                    </ul>
                </button>

                <button class="rol-card" data-rol="docente" aria-pressed="false">
                    <div class="rol-icono">
                        <i class="fas fa-chalkboard-teacher" aria-hidden="true"></i>
                    </div>
                    <h3>Docente</h3>
                    <p>Crea y administra tus cursos y gestiona a tus estudiantes.</p>
                    <ul class="rol-features">
                        <li><i class="fas fa-check" aria-hidden="true"></i> Crear y editar cursos</li>
                        <li><i class="fas fa-check" aria-hidden="true"></i> Gestionar estudiantes</li>
                        <li><i class="fas fa-check" aria-hidden="true"></i> Publicar tareas y archivos</li>
                        <li><i class="fas fa-check" aria-hidden="true"></i> Crear laboratorios</li>
                    </ul>
                </button>

            </div>

            <button class="btn-continuar" id="btnContinuarRol" disabled>
                Continuar <i class="fas fa-arrow-right" aria-hidden="true"></i>
            </button>

            <p class="texto-modal" style="margin-top:18px;">
                ¿Ya tienes cuenta? <a href="#" id="irLogin">Inicia sesión</a>
            </p>

        </div>

        <!-- ══ PASO 2: FORMULARIO ══════════════════════════════ -->
        <div id="pasoForm" class="paso-registro" style="display:none;">

            <button class="btn-cambiar-rol" id="btnCambiarRol" type="button">
                <i class="fas fa-arrow-left" aria-hidden="true"></i>
                Cambiar rol
            </button>

            <div class="modal-icono">
                <i id="iconoRolSeleccionado" class="fas fa-user-graduate" aria-hidden="true"></i>
            </div>

            <h2>Crear cuenta</h2>
            <p class="modal-subtitulo" id="subtituloRolSeleccionado">Estudiante</p>

            <form id="formRegistro">

                <!-- Campo oculto que guarda el rol elegido en el paso 1 -->
                <select id="rolRegistro" style="display:none;" required>
                    <option value="estudiante">Estudiante</option>
                    <option value="docente">Docente</option>
                </select>

                <label for="nombreRegistro">Nombres</label>
                <input type="text" id="nombreRegistro" placeholder="Carmela" required autocomplete="given-name">

                <label for="apellidoRegistro">Apellidos</label>
                <input type="text" id="apellidoRegistro" placeholder="Burgos" required autocomplete="family-name">

                <label for="telefonoRegistro">Número telefónico</label>
                <input type="tel" id="telefonoRegistro" placeholder="987654321" required autocomplete="tel">

                <label for="correoRegistro">Correo electrónico</label>
                <input type="email" id="correoRegistro" placeholder="correo@gmail.com" required autocomplete="email">

                <label for="passwordRegistro">Contraseña</label>
                <div class="input-password">
                    <input type="password" id="passwordRegistro" placeholder="••••••••" required minlength="6" autocomplete="new-password">
                    <i class="fas fa-eye toggle-password" data-target="passwordRegistro" aria-label="Mostrar contraseña" tabindex="0"></i>
                </div>

                <label for="confirmPassword">Confirmar contraseña</label>
                <div class="input-password">
                    <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6" autocomplete="new-password">
                    <i class="fas fa-eye toggle-password" data-target="confirmPassword" aria-label="Mostrar contraseña" tabindex="0"></i>
                </div>

                <button type="submit">
                    <i class="fas fa-user-plus" style="margin-right:8px" aria-hidden="true"></i>
                    REGISTRARME
                </button>

                <p class="texto-modal">
                    ¿Ya tienes cuenta? <a href="#" id="irLoginDesdeForm">Inicia sesión</a>
                </p>

                <!-- OTP -->
                <div id="seccionOTP" style="display:none; margin-top:20px;">
                    <p class="otp-aviso">📩 Ingresa el código que llegó a tu correo</p>
                    <div class="otp-boxes" role="group" aria-label="Código de verificación de 8 dígitos">
                        <input type="text" maxlength="1" class="otp-input" inputmode="numeric" aria-label="Dígito 1">
                        <input type="text" maxlength="1" class="otp-input" inputmode="numeric" aria-label="Dígito 2">
                        <input type="text" maxlength="1" class="otp-input" inputmode="numeric" aria-label="Dígito 3">
                        <input type="text" maxlength="1" class="otp-input" inputmode="numeric" aria-label="Dígito 4">
                        <input type="text" maxlength="1" class="otp-input" inputmode="numeric" aria-label="Dígito 5">
                        <input type="text" maxlength="1" class="otp-input" inputmode="numeric" aria-label="Dígito 6">
                        <input type="text" maxlength="1" class="otp-input" inputmode="numeric" aria-label="Dígito 7">
                        <input type="text" maxlength="1" class="otp-input" inputmode="numeric" aria-label="Dígito 8">
                    </div>
                    <button type="button" id="verificarOTP">
                        <i class="fas fa-check-circle" style="margin-right:8px" aria-hidden="true"></i>
                        VERIFICAR CÓDIGO
                    </button>
                </div>

            </form>
        </div>

    </div>
</div>

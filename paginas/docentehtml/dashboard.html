<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Dashboard Docente</title>

    <link rel="stylesheet"
    href="/paginas/docentehtml/dashboard.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">

            <h2>TechComputer<span>Edu</span></h2>

        </div>

        <ul>

            <li class="active">
                <a href="#"><i class="fas fa-chart-line"></i> Dashboard</a>
            </li>

            <li>
                <a href="cursosdoc.html"><i class="fas fa-book"></i> Cursos</a>
            </li>

            <li>
                <a href="estudiantes.html"><i class="fas fa-user-graduate"></i> Estudiantes</a>
            </li>

            <li>
                <a href="tareas.html"><i class="fas fa-clipboard-list"></i> Actividades</a>
            </li>

            <li>
                <a href="#"><i class="fas fa-cog"></i> Configuración</a>
            </li>

            <li>
                <a href="#" id="cerrarSesion">
                    <i class="fas fa-sign-out-alt"></i> Cerrar sesión
                </a>
            </li>

        </ul>

    </aside>

    <!-- CONTENIDO -->

    <main class="contenido">

        <!-- TOPBAR -->

        <header class="topbar">

            <h1 id="saludoUsuario">

                Cargando usuario...

            </h1>

            <div class="perfil">

                <img src="https://i.pravatar.cc/100"
                alt="Usuario">

                <span id="rolUsuario">

                    Cargando...

                </span>

            </div>

        </header>

        <!-- ESTADÍSTICAS -->

        <section class="estadisticas">

            <div class="card">

                <i class="fas fa-book"></i>

                <h3 id="totalCursos">0</h3>

                <p>Cursos</p>

            </div>

            <div class="card">

                <i class="fas fa-user-graduate"></i>

                <h3>0</h3>

                <p>Estudiantes</p>

            </div>

            <div class="card">

                <i class="fas fa-file-alt"></i>

                <h3>0</h3>

                <p>Actividades</p>

            </div>

            <div class="card">

                <i class="fas fa-folder-open"></i>

                <h3>0</h3>

                <p>Materiales</p>

            </div>

        </section>

    </main>

    <!-- SUPABASE -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script src="/js/supabase.js"></script>

    <script src="/js/docentejs/dashboard.js"></script>

</body>

</html>

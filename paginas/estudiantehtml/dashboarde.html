<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Dashboard Estudiante</title>

<link rel="stylesheet"
href="/paginas/estudiantehtml/dashboarde.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<!-- SIDEBAR -->

<aside class="sidebar">

    <div class="logo">

        <h2>TechComputer<span>Edu</span></h2>

    </div>

    <ul>

        <li class="active">

            <a href="#">

                <i class="fas fa-home"></i>

                Inicio

            </a>

        </li>

        <li>

            <a href="miscursos.html">

                <i class="fas fa-book"></i>

                Mis Cursos

            </a>

        </li>

        <li>

            <a href="actividades.html">

                <i class="fas fa-clipboard-list"></i>

                Actividades

            </a>

        </li>

        <li>

            <a href="perfil.html">

                <i class="fas fa-user"></i>

                Mi Perfil

            </a>

        </li>

        <li>

            <a href="#" id="cerrarSesion">

                <i class="fas fa-sign-out-alt"></i>

                Cerrar sesión

            </a>

        </li>

    </ul>

</aside>

<!-- CONTENIDO -->

<main class="contenido">

    <header class="topbar">

        <h1 id="saludoUsuario">

            Cargando...

        </h1>

        <div class="perfil">

            <img
            src="https://i.pravatar.cc/100"
            alt="Estudiante">

            <span id="rolUsuario">

                Cargando...

            </span>

        </div>

    </header>

    <!-- RESUMEN -->

    <section class="estadisticas">

        <div class="card">

            <i class="fas fa-book"></i>

            <h3 id="totalCursos">

                0

            </h3>

            <p>Cursos inscritos</p>

        </div>

        <div class="card">

            <i class="fas fa-file-alt"></i>

            <h3 id="totalActividades">

                0

            </h3>

            <p>Actividades</p>

        </div>

        <div class="card">

            <i class="fas fa-check-circle"></i>

            <h3 id="totalEntregas">

                0

            </h3>

            <p>Tareas entregadas</p>

        </div>

    </section>

    <!-- CURSOS -->

    <section class="panel-cursos">

        <div class="titulo-panel">

            <h2>Mis Cursos</h2>

        </div>

        <div id="listaCursos">

        </div>

    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/js/supabase.js"></script>

<script src="/js/estudiantejs/dashboarde.js"></script>

</body>

</html>

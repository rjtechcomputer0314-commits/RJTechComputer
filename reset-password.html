<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña | RJTechComputer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #021A54, #0B2F87, #FF85BB, #021A54);
            background-size: 400% 400%;
            animation: fondoAnimado 10s ease infinite;
            padding: 20px;
        }

        @keyframes fondoAnimado {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        /* LOGO / TÍTULO ARRIBA */
        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h1 {
            font-size: 22px;
            font-weight: 800;
            color: white;
            letter-spacing: 1px;
        }

        .brand h1 span {
            color: #FF85BB;
        }

        .brand p {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-top: 4px;
        }

        /* TARJETA */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: aparecer 0.5s ease;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ICONO CANDADO */
        .icono-top {
            text-align: center;
            margin-bottom: 20px;
        }

        .icono-top i {
            font-size: 42px;
            color: #FF85BB;
            filter: drop-shadow(0 0 12px rgba(255, 133, 187, 0.5));
        }

        h2 {
            text-align: center;
            color: white;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitulo {
            text-align: center;
            color: rgba(255,255,255,0.65);
            font-size: 13.5px;
            margin-bottom: 28px;
        }

        /* FORM */
        label {
            display: block;
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            margin-top: 18px;
        }

        label:first-of-type {
            margin-top: 0;
        }

        /* INPUT WRAPPER con ojito */
        .input-wrapper {
            position: relative;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 14px 46px 14px 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 14px;
            outline: none;
            font-size: 15px;
            background: rgba(255,255,255,0.12);
            color: white;
            transition: 0.3s;
        }

        input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        input:focus {
            border-color: #FF85BB;
            background: rgba(255,255,255,0.18);
            box-shadow: 0 0 16px rgba(255,133,187,0.35);
        }

        /* OJO */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255,255,255,0.5);
            font-size: 16px;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: #FF85BB;
        }

        /* INDICADOR FUERZA */
        .fuerza-bar {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .fuerza-bar span {
            flex: 1;
            height: 4px;
            border-radius: 4px;
            background: rgba(255,255,255,0.15);
            transition: background 0.4s;
        }

        .fuerza-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 5px;
            min-height: 16px;
        }

        /* BOTÓN */
        button[type="submit"] {
            width: 100%;
            margin-top: 28px;
            padding: 16px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: white;
            background: linear-gradient(135deg, #FF85BB, #021A54);
            background-size: 200% 200%;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        button[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,133,187,0.45);
            background-position: right center;
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        /* VOLVER */
        .volver {
            text-align: center;
            margin-top: 20px;
        }

        .volver a {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .volver a:hover {
            color: #FF85BB;
        }

        .volver a i {
            margin-right: 5px;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .card {
                padding: 30px 22px;
            }

            h2 {
                font-size: 20px;
            }

            .icono-top i {
                font-size: 34px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- MARCA -->
        <div class="brand">
            <h1>RJTech<span>Computer</span></h1>
            <p>Plataforma Educativa Tecnológica</p>
        </div>

        <!-- TARJETA -->
        <div class="card">

            <div class="icono-top">
                <i class="fas fa-lock"></i>
            </div>

            <h2>Nueva contraseña</h2>
            <p class="subtitulo">Elige una contraseña segura para tu cuenta</p>

            <form id="formReset">

                <label>Nueva contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="nuevaPassword" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" data-target="nuevaPassword"></i>
                </div>
                <div class="fuerza-bar">
                    <span id="b1"></span>
                    <span id="b2"></span>
                    <span id="b3"></span>
                    <span id="b4"></span>
                </div>
                <div class="fuerza-label" id="fuerzaLabel"></div>

                <label>Confirmar contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmarPassword" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" data-target="confirmarPassword"></i>
                </div>

                <button type="submit">
                    <i class="fas fa-shield-alt" style="margin-right:8px"></i>
                    GUARDAR CONTRASEÑA
                </button>

            </form>

            <div class="volver">
                <a href="/index.html">
                    <i class="fas fa-arrow-left"></i> Volver al inicio
                </a>
            </div>

        </div>
    </div>

    <script>
        // OJITOS
        document.querySelectorAll(".toggle-password").forEach(icon => {
            icon.addEventListener("click", () => {
                const input = document.getElementById(icon.dataset.target);
                if (input.type === "password") {
                    input.type = "text";
                    icon.classList.replace("fa-eye", "fa-eye-slash");
                } else {
                    input.type = "password";
                    icon.classList.replace("fa-eye-slash", "fa-eye");
                }
            });
        });

        // INDICADOR DE FUERZA
        document.getElementById("nuevaPassword").addEventListener("input", function () {
            const val = this.value;
            let fuerza = 0;
            if (val.length >= 8) fuerza++;
            if (/[A-Z]/.test(val)) fuerza++;
            if (/[0-9]/.test(val)) fuerza++;
            if (/[^A-Za-z0-9]/.test(val)) fuerza++;

            const colores = ["#e74c3c", "#e67e22", "#f1c40f", "#2ecc71"];
            const etiquetas = ["Muy débil", "Débil", "Buena", "Fuerte"];

            for (let i = 1; i <= 4; i++) {
                const bar = document.getElementById("b" + i);
                bar.style.background = i <= fuerza ? colores[fuerza - 1] : "rgba(255,255,255,0.15)";
            }

            document.getElementById("fuerzaLabel").textContent =
                val.length > 0 ? etiquetas[fuerza - 1] || "" : "";
            document.getElementById("fuerzaLabel").style.color =
                fuerza > 0 ? colores[fuerza - 1] : "rgba(255,255,255,0.5)";
        });

        // SUBMIT
        document.getElementById("formReset").addEventListener("submit", async (e) => {
            e.preventDefault();

            const nueva = document.getElementById("nuevaPassword").value;
            const confirmar = document.getElementById("confirmarPassword").value;

            if (nueva !== confirmar) {
                alert("Las contraseñas no coinciden");
                return;
            }

            if (nueva.length < 6) {
                alert("La contraseña debe tener al menos 6 caracteres");
                return;
            }

            const { error } = await supabaseClient.auth.updateUser({
                password: nueva
            });

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("¡Contraseña actualizada correctamente!");
                window.location.href = "/index.html";
            }
        });
    </script>

</body>
</html>

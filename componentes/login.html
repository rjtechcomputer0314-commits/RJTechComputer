<!-- MODAL LOGIN -->
<div class="modal" id="modalLogin">

    <div class="modal-contenido">

        <span class="cerrar" id="cerrarLogin">
            &times;
        </span>

        <h2>Iniciar sesión</h2>

        <form id="formLogin">
            <label>Correo electrónico</label>
            <input type="email"id="correoLogin" placeholder="correo@gmail.com"required>
            <label>Contraseña</label>
            <div class="input-password">
                <input type="password" id="passwordLogin"placeholder="********" required>
                <i class="fas fa-eye toggle-password" data-target="passwordLogin"></i>
            </div>

            <button type="submit"> INGRESAR  </button>

            <p class="texto-modal">
                ¿No tienes cuenta?
                <a href="#"id="irRegistro"> Regístrate </a>

            </p>

        </form>

    </div>

</div>

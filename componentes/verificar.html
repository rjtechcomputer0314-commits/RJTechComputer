<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar correo | RJTechComputer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
 
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #021A54, #0B2F87, #FF85BB, #021A54);
            background-size: 400% 400%;
            animation: fondoAnimado 10s ease infinite;
            padding: 20px;
        }
 
        @keyframes fondoAnimado {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
 
        .container {
            width: 100%;
            max-width: 420px;
        }
 
        .brand {
            text-align: center;
            margin-bottom: 24px;
        }
 
        .brand h1 {
            font-size: 22px;
            font-weight: 800;
            color: white;
            letter-spacing: 1px;
        }
 
        .brand h1 span { color: #FF85BB; }
 
        .brand p {
            color: rgba(255,255,255,0.65);
            font-size: 13px;
            margin-top: 4px;
        }
 
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: aparecer 0.5s ease;
            text-align: center;
        }
 
        @keyframes aparecer {
            from { opacity: 0; transform: translateY(-30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
 
        .icono-top i {
            font-size: 50px;
            color: #FF85BB;
            filter: drop-shadow(0 0 14px rgba(255,133,187,0.5));
            margin-bottom: 18px;
        }
 
        h2 {
            color: white;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
 
        .subtitulo {
            color: rgba(255,255,255,0.6);
            font-size: 13.5px;
            margin-bottom: 10px;
        }
 
        .correo-destino {
            color: #FF85BB;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 28px;
            word-break: break-all;
        }
 
        /* CAJAS OTP */
        .otp-boxes {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
        }
 
        .otp-boxes input {
            width: 52px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: white;
            background: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 14px;
            outline: none;
            transition: 0.3s;
            caret-color: #FF85BB;
        }
 
        .otp-boxes input:focus {
            border-color: #FF85BB;
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 16px rgba(255,133,187,0.35);
            transform: scale(1.08);
        }
 
        .otp-boxes input::placeholder {
            color: rgba(255,255,255,0.2);
        }
 
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: white;
            background: linear-gradient(135deg, #FF85BB, #021A54);
            transition: 0.3s;
        }
 
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,133,187,0.45);
        }
 
        button:active { transform: scale(0.98); }
 
        .reenviar {
            margin-top: 18px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }
 
        .reenviar a {
            color: #FF85BB;
            text-decoration: none;
            font-weight: 600;
        }
 
        .reenviar a:hover { text-decoration: underline; }
 
        .volver {
            margin-top: 16px;
        }
 
        .volver a {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
        }
 
        .volver a:hover { color: #FF85BB; }
 
        @media (max-width: 480px) {
            .card { padding: 30px 20px; }
            .otp-boxes input { width: 44px; height: 52px; font-size: 20px; }
            h2 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
 
        <div class="brand">
            <h1>RJTech<span>Computer</span></h1>
            <p>Plataforma Educativa Tecnológica</p>
        </div>
 
        <div class="card">
 
            <div class="icono-top">
                <i class="fas fa-envelope-open-text"></i>
            </div>
 
            <h2>Verifica tu correo</h2>
            <p class="subtitulo">Te enviamos un código de 6 dígitos a</p>
            <p class="correo-destino" id="correoMostrado">tu correo</p>
 
            <!-- CAJAS OTP -->
            <div class="otp-boxes">
                <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
                <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
            </div>
 
            <button id="btnVerificar">
                <i class="fas fa-check-circle" style="margin-right:8px"></i>
                VERIFICAR CÓDIGO
            </button>
 
            <p class="reenviar">
                ¿No llegó el correo?
                <a href="#" id="reenviarCodigo">Reenviar</a>
            </p>
 
            <div class="volver">
                <a href="/registro.html">
                    <i class="fas fa-arrow-left"></i> Volver al registro
                </a>
            </div>
 
        </div>
    </div>
 
    <script>
        // Mostrar correo
        const correo = sessionStorage.getItem("correoRegistro");
        if (!correo) {
            window.location.href = "/registro.html";
        } else {
            document.getElementById("correoMostrado").textContent = correo;
        }
 
        // Navegación entre cajas OTP
        const inputs = document.querySelectorAll(".otp-input");
 
        inputs.forEach((input, i) => {
            input.addEventListener("input", () => {
                input.value = input.value.replace(/\D/g, "");
                if (input.value && i < inputs.length - 1) {
                    inputs[i + 1].focus();
                }
            });
 
            input.addEventListener("keydown", (e) => {
                if (e.key === "Backspace" && !input.value && i > 0) {
                    inputs[i - 1].focus();
                }
            });
        });
 
        // Obtener código completo
        function getToken() {
            return Array.from(inputs).map(i => i.value).join("");
        }
 
        // VERIFICAR
        document.getElementById("btnVerificar").addEventListener("click", async () => {
            const token = getToken();
 
            if (token.length < 6) {
                alert("Ingresa los 6 dígitos del código.");
                return;
            }
 
            const { error } = await supabaseClient.auth.verifyOtp({
                email: correo,
                token: token,
                type: "signup"
            });
 
            if (error) {
                alert("Código incorrecto o expirado.");
                return;
            }
 
            // Insertar perfil ahora que tiene sesión activa
            const perfil = JSON.parse(sessionStorage.getItem("perfilTemp"));
 
            const { error: errorPerfil } = await supabaseClient
                .from("perfiles")
                .insert([perfil]);
 
            if (errorPerfil) {
                alert("Error al guardar perfil: " + errorPerfil.message);
                return;
            }
 
            sessionStorage.removeItem("correoRegistro");
            sessionStorage.removeItem("perfilTemp");
 
            alert("¡Correo verificado! Ya puedes iniciar sesión.");
            window.location.href = "/index.html";
        });
 
        // REENVIAR
        document.getElementById("reenviarCodigo").addEventListener("click", async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.auth.resend({
                type: "signup",
                email: correo
            });
            if (error) {
                alert("Error al reenviar: " + error.message);
            } else {
                alert("Código reenviado a tu correo.");
            }
        });
    </script>
</body>
</html>

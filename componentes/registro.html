<!-- MODAL REGISTRO -->

<div class="modal" id="modalRegistro">

    <div class="modal-contenido">

        <span class="cerrar"
        id="cerrarRegistro">
            &times;
        </span>

        <h2>Crear cuenta</h2>

        <form>

            <label>Nombres</label>

            <input type="text"
            placeholder="Carmela">

            <label>Apellidos</label>

            <input type="text"
            placeholder="Burgos">

            <label>Correo electrónico</label>

            <input type="email"
            placeholder="correo@gmail.com">

            <!-- PASSWORD -->

            <label>Contraseña</label>

            <div class="input-password">

                <input type="password"
                id="passwordRegistro"
                placeholder="********">

                <i class="fas fa-eye
                toggle-password"
                data-target="passwordRegistro"></i>

            </div>

            <!-- CONFIRMAR -->

            <label>Confirmar contraseña</label>

            <div class="input-password">

                <input type="password"
                id="confirmPassword"
                placeholder="********">

                <i class="fas fa-eye
                toggle-password"
                data-target="confirmPassword"></i>

            </div>

            <button type="submit">

                REGISTRARME

            </button>

            <p class="texto-modal">

                ¿Ya tienes cuenta?

                <a href="#"
                id="irLogin">

                    Inicia sesión

                </a>

            </p>

        </form>

    </div>

</div>

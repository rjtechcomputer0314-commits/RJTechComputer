
<!-- MODAL REGISTRO -->
<div class="modal" id="modalRegistro">

    <div class="modal-contenido">

        <span class="cerrar"
        id="cerrarRegistro">
            &times;
        </span>

        <h2>Crear cuenta</h2>

    <form id="formRegistro">

    <label>Nombres</label>

    <input 
    type="text"
    id="nombreRegistro"
    placeholder="Carmela"
    required>

    <label>Apellidos</label>

    <input 
    type="text"
    id="apellidoRegistro"
    placeholder="Burgos"
    required>

    <label>Número telefónico</label>

<input 
type="tel"
id="telefonoRegistro"
placeholder="987654321"
required>

    <label>Correo electrónico</label>

    <input 
    type="email"
    id="correoRegistro"
    placeholder="correo@gmail.com"
    required>

    <label>Tipo de cuenta</label>

<select id="rolRegistro" required>

    <option value="">
        Selecciona una opción
    </option>

    <option value="estudiante">
        Estudiante
    </option>

    <option value="docente">
        Docente
    </option>

</select>

    <!-- PASSWORD -->

    <label>Contraseña</label>

    <div class="input-password">

        <input 
        type="password"
        id="passwordRegistro"
        placeholder="********"
        required>

        <i class="fas fa-eye
        toggle-password"
        data-target="passwordRegistro"></i>

    </div>

    <!-- CONFIRMAR -->

    <label>Confirmar contraseña</label>

    <div class="input-password">

        <input 
        type="password"
        id="confirmPassword"
        placeholder="********"
        required>

        <i class="fas fa-eye
        toggle-password"
        data-target="confirmPassword"></i>

    </div>

    <button type="submit">

        REGISTRARME

    </button>

    <p class="texto-modal">

        ¿Ya tienes cuenta?

        <a href="#"
        id="irLogin">

            Inicia sesión

        </a>

    </p>

</form>

    </div>

</div>
